<div id="contact" class="section db">
    <div class="container">
        <div class="section-title text-center">
            <h3>Register</h3>
        </div>
        <form class="contact_form" th:action="@{/dynamics/events/addCoding}" th:object="${codingUser}" method="post">
            <!--            <p class="helper-text">* denotes a required field</p>-->
            <div class="form-group">
                <label class="form-label" for="firstName">First name</label>
                <input type="text" id="firstName" class="form-control" th:field="*{firstName}" required>
            </div>
            <div class="form-group">
                <label class="form-label cf" for="lastName">Last name</label>
                <input type="text" id="lastName" class="form-control" th:field="*{lastName}" required>
            </div>


            <div class="form-group">
                <label class="form-label">Year</label>
                <select class="form-control" th:field="*{year}">
                    <option value="0">---------</option>
                    <option value="1st Year"> 1st Year </option>
                    <option value="2nd Year"> 2nd Year </option>
                    <option value="3rd Year"> 3rd Year </option>
                    <option value="4th Year"> 4th Year </option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Branch</label>
                <select class="form-control" th:field="*{branch}" required>
                    <option value="0">---------</option>
                    <option value="BIO">Bio Technology</option>
                    <option value="CHEM">Chemical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="CSE"> Computer ScienceEngineering </option>
                    <option value="ISE">Information Science Engineering</option>
                    <option value="EEE">Electrical Electronics Engineering</option>
                    <option value="ECE">Electronics Communication Engineering</option>
                    <option value="EIE">Electronics Instrumentation Engineering</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="TEL">Telecommunication Engineering</option>
                    <option value="OTHERS">Others</option>

                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="usn">USN</label>
                <input type="text" id="usn" class="form-control" th:field="*{usn}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Event*</label>
                <select class="form-control" th:field="*{event_name}">
                    <option value="0">---------</option>
                    <option value="CODE@ARENA">CODE@ARENA</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">HackerRank ID*</label>
                <input type="text" id="hack_id" class="form-control" th:field="*{hack_id}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-control" th:field="*{email}" required>

            </div>
            <div class="form-group">
                <label class="form-label" for="tel">Contact</label>
                <input type="tel" id="tel" class="form-control" th:field="*{contact}" required>
            </div>
            <div class="col-lg-12 text-center">
                <input type="submit" class="sim-btn hvr-bounce-to-top" value="Register">
                <input type="reset" class="sim-btn hvr-bounce-to-top" value="Clear">
            </div>
        </form>
    </div>
</div>
